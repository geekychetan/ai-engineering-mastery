# Continuous Integration — runs the test suite on every push and pull request.
# You'll study this in Week 11 (Docker, CI). It gives every PR a green (or red)
# check, so you never merge code that breaks the tests.
#
# We use uv (docs.astral.sh/uv) so CI matches your local workflow exactly:
# the same `uv sync` + `uv run pytest` you run on your machine.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out your repository code onto the runner.
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Install uv (it will provide the Python version from pyproject.toml).
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Install the project + dev dependencies (pytest) into a fresh venv.
      - name: Install dependencies
        run: uv sync

      # 4. Run the tests. pytest exits with code 5 when it finds NO tests yet —
      #    early in the course that's expected, so we treat "no tests" as a pass.
      - name: Run pytest
        run: |
          set +e
          uv run pytest -q
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No tests collected yet — passing. Add tests from Week 3 onward!"
            exit 0
          fi
          exit $code
